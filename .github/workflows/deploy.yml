name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: devops-challenge-app
  EKS_CLUSTER_NAME: devops-challenge-cluster # Updated to match the provisioned cluster
  AWS_REGION: us-east-1            # Updated to match the provisioned cluster

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest, ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          # Apply Redis deployment
          kubectl apply -f k8s/redis-deployment.yaml
          
          # Replace image placeholder and apply App deployment
          sed -i "s|<YOUR_DOCKERHUB_USERNAME>|${{ secrets.DOCKER_USERNAME }}|g" k8s/app-deployment.yaml
          kubectl apply -f k8s/app-deployment.yaml
          
          # Force a rollout restart to ensure the new image is pulled if using :latest
          kubectl rollout restart deployment devops-app
