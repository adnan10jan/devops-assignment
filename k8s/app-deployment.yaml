apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  labels:
    app: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
      - name: devops-app
        # Note: Replace <YOUR_DOCKERHUB_USERNAME> with actual username when running
        image: <YOUR_DOCKERHUB_USERNAME>/devops-challenge-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: REDIS_HOST
          value: "redis" # INTENTIONAL FAILURE: Change this to "wrong-redis" to simulate failure
        - name: REDIS_PORT
          value: "6379"
        
        # RELIABILITY IMPROVEMENT: Liveness & Readiness Probes
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-service
spec:
  type: LoadBalancer # Using LoadBalancer to easily expose on EKS
  selector:
    app: devops-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
